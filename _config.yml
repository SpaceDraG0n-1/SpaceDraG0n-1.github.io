title: SpaceDraG0n
subtitle: 认真做事，坚持学习
description: SpaceDraG0n 的个人博客，记录 Kernel、Pwn、漏洞复现和长期技术笔记。
keywords:
  - blog
  - kernel
  - pwn
  - exploit
  - notes
  - security
author: SpaceDraG0n
language: zh-CN
timezone: Asia/Shanghai

url: https://spacedrag0n-1.github.io
root: /
permalink: posts/:title/
permalink_defaults:
pretty_urls:
  trailing_index: false
  trailing_html: true

source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang

new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''
marked:
  prependRoot: true
  postAsset: true

index_generator:
  path: ''
  per_page: 6
  order_by: -date

default_category: notes
category_map:
tag_map:

meta_generator: true

date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: mtime

per_page: 6
pagination_dir: page

include:
exclude:
ignore:

theme: redefine

search:
  path: search.xml
  field: post
  format: html
  limit: 10000

feed:
  type:
    - atom
  path: atom.xml
  limit: 20
  hub:
  content: true
  content_limit: 140
  content_limit_delim: ' '
  order_by: -date

sitemap:
  path: sitemap.xml

deploy:
  type: ''
